deploy-to-render:
  stage: deploy
  image: alpine/curl
  script:
    - apk add --no-cache jq
    - |
      # Récupérer l'ID du compte Render
      OWNER_ID=$(curl -s -X GET "https://api.render.com/v1/teams" \
        -H "Authorization: Bearer $RENDER_API_KEY" \
        -H "Accept: application/json" | jq -r '.[0].id')

      response=$(curl -s -X POST "https://api.render.com/v1/services" \
        -H "Authorization: Bearer $RENDER_API_KEY" \
        -H "Content-Type: application/json" \
        -d '{
          "name": "'$RENDER_SERVICE_NAME'",
          "type": "web_service",
          "ownerId": "'$OWNER_ID'",
          "runtime": "python",
          "plan": "free",
          "buildCommand": "pip install --upgrade pip && pip install -r requirements.txt",
          "startCommand": "python app.py",
          "envVars": [
            {
              "key": "PYTHON_VERSION",
              "value": "3.13"
            }
          ]
        }')

      if ! echo "$response" | jq -e '.id' > /dev/null; then
        echo "Erreur: $(echo "$response" | jq -r '.message')"
        exit 1
      fi
      echo "Déploiement réussi: https://${RENDER_SERVICE_NAME}.onrender.com"
  only:
    - main