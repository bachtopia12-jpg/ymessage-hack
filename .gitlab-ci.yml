stages:
  - build
  - test
  - deploy

build:
  stage: build
  script:
    - docker build -t mon-app .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push mon-app

test:
  stage: test
  script:
    - echo "Je fais des tests ! "

deploy:
  stage: deploy
  script:
    - chmod +x deploy.sh  
    - ./deploy.sh 
  only:
    - main 